name: "Release Builder (Windows & Linux)"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
            target: 'aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-wasip1

      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf python3

      - name: Generate Third-Party Notices
        run: python3 scripts/generate_licenses.py

      - name: Build WASM Sandbox
        working-directory: ./wasm-sandbox
        run: cargo build --target wasm32-wasip1 --release

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: zdefuser-v__VERSION__
          releaseName: "ZDefuser v__VERSION__"
          releaseBody: "Automated core release. Zero-trust sandbox built."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
